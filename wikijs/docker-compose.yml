services:
  wikijs:
    image: ghcr.io/requarks/wiki:2
    environment:
      - DB_TYPE=postgres
      - DB_HOST=wikijs_db
      - DB_PORT=5432
      - DB_USER=wikijs
      - DB_PASS=sicherespasswort
      - DB_NAME=wikijs
    ports:
      - 3000:3000
    depends_on:
      - wikijs_db

  wikijs_db:
    image: postgres:15
    environment:
      - POSTGRES_USER=wikijs
      - POSTGRES_PASSWORD=sicherespasswort
      - POSTGRES_DB=wikijs
    volumes:
      - ./wikijs_db:/var/lib/postgresql/data
