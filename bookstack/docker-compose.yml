services:
  bookstack:
    image: lscr.io/linuxserver/bookstack
    environment:
      - APP_URL=https://doku.deinedomain.de
      - DB_HOST=bookstack_db
      - DB_USER=bookstack
      - DB_PASS=sicherespasswort
      - DB_DATABASE=bookstack
    volumes:
      - ./bookstack_data:/config
    ports:
      - 6875:80
    depends_on:
      - bookstack_db

  bookstack_db:
    image: lscr.io/linuxserver/mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=rootpasswort
      - MYSQL_DATABASE=bookstack
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=sicherespasswort
    volumes:
      - ./bookstack_db:/config
